<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание мероприятия</title>
    <link rel="stylesheet" href="styles3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="back-button">
                <button class="btn btn-secondary" onclick="window.location.href='events.html'">
                    <i class="fas fa-arrow-left"></i> Назад к мероприятиям
                </button>
            </div>

            <h2 id="formTitle">Создание мероприятия</h2>

            <div id="message" class="message"></div>
            <div class="loader" id="loader"></div>

            <form id="eventForm">
                <input type="hidden" id="eventId">

                <div class="form-group">
                    <label for="name">Название *</label>
                    <input type="text" id="name" required maxlength="200">
                </div>

                <div class="form-group">
                    <label for="description">Описание</label>
                    <textarea id="description" rows="4" maxlength="1000"></textarea>
                </div>

                <div class="form-group">
                    <label for="startDate">Дата начала *</label>
                    <input type="datetime-local" id="startDate" required>
                </div>

                <div class="form-group">
                    <label for="endDate">Дата окончания *</label>
                    <input type="datetime-local" id="endDate" required>
                </div>

                <div class="form-group">
                    <label for="registrationDeadline">Дедлайн регистрации *</label>
                    <input type="datetime-local" id="registrationDeadline" required>
                </div>

                <div class="form-group">
                    <label for="minGiftAmount">Мин. сумма подарка (₽)</label>
                    <input type="number" id="minGiftAmount" min="0" step="0.01">
                </div>

                <div class="form-group">
                    <label for="maxGiftAmount">Макс. сумма подарка (₽)</label>
                    <input type="number" id="maxGiftAmount" min="0" step="0.01">
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="isPrivate" checked>
                        <i class="fas fa-lock" style="color: var(--primary); margin-right: 5px;"></i>
                        Приватное мероприятие (только по приглашениям)
                    </label>
                    <small style="color: var(--gray); display: block; margin-top: 5px;">
                        Приватные мероприятия видны только приглашенным участникам
                    </small>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">Создать</button>
            </form>
        </div>
    </div>

    <script src="event.js"></script>
</body>

</html>
