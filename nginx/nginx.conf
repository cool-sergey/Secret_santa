worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;

        location /uploads/avatars/ {
            alias /app/uploads/avatars/;
            expires 1M;
            add_header Cache-Control "public, immutable";
        }

        location /api/user/ {
            proxy_pass http://user-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/wishlist/ {
            proxy_pass http://wishlists-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/event/ {
            proxy_pass http://event-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /user/ {
            alias /usr/share/nginx/html/user/;
            index index.html;
            try_files $uri /user/index.html;
        }

        location /wishlist/ {
            alias /usr/share/nginx/html/wishlist/;
            index wishlist.html;
            try_files $uri /wishlist/wishlist.html;
        }

        location /event/ {
            alias /usr/share/nginx/html/event/;
            index events.html;
            try_files $uri /event/events.html;
        }

        location / {
            return 301 /user/;
        }
    }
}
